name: CI/CD Credit_Scoring

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ============================================
  # JOB 1: TESTS
  # ============================================
  test:
    name: Run Tests unitaires et intégration
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run unit & integration tests
      run: |
        python -m pytest test_api.py -v


  # ============================================
  # JOB 2: BUILD DOCKER IMAGE
  # ============================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t api-scoring-credit:latest .

    - name: Run Docker container
      run: |
        docker run -d -p 7860:7860 --name test-api api-scoring-credit:latest

    - name: Wait for API & health check
      run: |
        echo "Waiting for API..."

        for i in {1..15}; do
          echo "Attempt $i..."

          if curl -f http://localhost:7860/health; then
            echo "API is UP ✔"
            break
          fi

          sleep 2
        done

        # fail si API ne répond jamais
        curl -f http://localhost:7860/health

    - name: Show logs if failure
      if: failure()
      run: |
        docker logs test-api

    - name: Stop container
      run: |
        docker stop test-api || true

    - name: Save Docker image
      run: |
        docker save api-scoring-credit:latest -o image.tar

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: image.tar
        retention-days: 1